<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Rezepte</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── ÜBERSICHT ── -->
  <div id="viewHome" class="view active">
    <header class="topbar">
      <h1 class="topbar-title">Meine Rezepte</h1>
      <button class="icon-btn" id="btnOpenAdd" aria-label="Rezept hinzufügen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </header>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchInput" placeholder="Rezepte durchsuchen..." autocomplete="off" />
    </div>

    <div id="recipeGrid" class="recipe-grid"></div>
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">🍽️</div>
      <p>Noch keine Rezepte gespeichert.</p>
      <p class="empty-sub">Tippe auf <strong>+</strong> um dein erstes Rezept hinzuzufügen.</p>
    </div>
    <div id="noResults" class="empty-state hidden">
      <div class="empty-icon">🔍</div>
      <p>Kein Rezept gefunden.</p>
    </div>
  </div>

  <!-- ── DETAIL ── -->
  <div id="viewDetail" class="view">
    <header class="topbar">
      <button class="icon-btn" id="btnBackDetail" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="topbar-title" id="detailTitle"></h1>
      <div style="display:flex;gap:4px">
        <button class="icon-btn" id="btnEdit" aria-label="Bearbeiten">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn btn-delete" id="btnDelete" aria-label="Löschen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </header>
    <div class="detail-body">
      <div id="detailImage" class="detail-image hidden"></div>
      <div class="detail-content">
        <div id="detailText" class="detail-text"></div>
        <a id="detailLink" href="#" target="_blank" class="detail-link hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span id="detailLinkText"></span>
        </a>
      </div>
    </div>
  </div>

  <!-- ── FORMULAR (Hinzufügen / Bearbeiten) ── -->
  <div id="viewForm" class="view">
    <header class="topbar">
      <button class="icon-btn" id="btnBackForm" aria-label="Abbrechen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="topbar-title" id="formTitle">Rezept hinzufügen</h1>
      <button class="btn-save" id="btnSave">Speichern</button>
    </header>
    <div class="form-body">

      <div class="form-field">
        <label>Titel</label>
        <input type="text" id="fTitle" placeholder="z.B. Spaghetti Carbonara" />
      </div>

      <div class="form-field">
        <label>Titelbild</label>
        <div class="img-picker" id="imgPicker">
          <div id="imgPreview" class="img-preview hidden"></div>
          <div id="imgPlaceholder" class="img-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Bild auswählen</span>
          </div>
          <input type="file" id="fImage" accept="image/*" hidden />
        </div>
        <button class="btn-ghost-sm" id="btnRemoveImg" style="display:none">Bild entfernen</button>
      </div>

      <div class="form-field">
        <label>Notizen / Zutaten / Zubereitung</label>
        <textarea id="fText" placeholder="Hier kannst du alles eintragen — Zutaten, Schritte, Tipps..."></textarea>
      </div>

      <div class="form-field">
        <label>Quell-Link (optional)</label>
        <input type="url" id="fLink" placeholder="https://..." />
      </div>

      <div class="form-field">
        <label>Screenshots / weitere Bilder</label>
        <div id="extraImgList" class="extra-img-list"></div>
        <label class="btn-secondary-sm" for="fExtraImages">+ Bild hinzufügen</label>
        <input type="file" id="fExtraImages" accept="image/*" multiple hidden />
      </div>

    </div>
  </div>

  <!-- ── DELETE CONFIRM ── -->
  <div id="deleteModal" class="modal-backdrop hidden">
    <div class="modal">
      <p>Rezept wirklich löschen?</p>
      <div class="modal-actions">
        <button class="btn-danger" id="btnConfirmDelete">Löschen</button>
        <button class="btn-ghost" id="btnCancelDelete">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
